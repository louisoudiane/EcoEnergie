<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Flex - Suivi Énergie</title>
    <style>
        /* Style global et fond dégradé (Rappel des couleurs de l'app) */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, rgba(52, 199, 89, 0.15) 0%, rgba(255, 149, 0, 0.15) 100%), #f2f2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1c1c1e;
        }

        /* La carte centrale en Glassmorphism (Effet iOS) */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin: 20px;
        }

        /* Typographie */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #3a3a3c;
            margin-bottom: 30px;
        }

        /* Les petites pilules de couleur (En-tête) */
        .status-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .badge-eco {
            background-color: rgba(52, 199, 89, 0.2);
            color: #28a745;
        }

        .badge-sobriety {
            background-color: rgba(255, 149, 0, 0.2);
            color: #ff9500;
        }

        /* --- Section Historique des 7 jours --- */
        .history-section {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }

        .history-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            text-align: left;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .day-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .day-label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 600;
        }

        .capsule {
            width: 24px;
            height: 40px;
            border-radius: 12px;
        }

        /* Couleurs pleines pour les pilules de l'historique */
        .fill-eco {
            background-color: #34c759;
        }

        .fill-sobriety {
            background-color: #ff9500;
        }

    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Zen Flex</h1>
        
        <div class="status-container">
            <span class="badge badge-eco">Jour Éco</span>
            <span class="badge badge-sobriety">Sobriété</span>
        </div>

        <p>L'application iOS pour suivre facilement la couleur de vos jours EDF Zen Flex. Consultez le statut d'aujourd'hui, anticipez demain, et gardez un œil sur votre semaine.</p>
        
        <div class="history-section">
            <div class="history-title">7 derniers jours</div>
            <div class="history-row">
                <div class="day-item">
                    <span class="day-label">Ven</span>
                    <div class="capsule fill-eco"></div>
                </div>
                <div class="day-item">
                    <span class="day-label">Sam</span>
                    <div class="capsule fill-eco"></div>
                </div>
                <div class="day-item">
                    <span class="day-label">Dim</span>
                    <div class="capsule fill-eco"></div>
                </div>
                <div class="day-item">
                    <span class="day-label">Lun</span>
                    <div class="capsule fill-sobriety"></div>
                </div>
                <div class="day-item">
                    <span class="day-label">Mar</span>
                    <div class="capsule fill-eco"></div>
                </div>
                <div class="day-item">
                    <span class="day-label">Mer</span>
                    <div class="capsule fill-eco"></div>
                </div>
                <div class="day-item">
                    <span class="day-label">Jeu</span>
                    <div class="capsule fill-eco"></div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
